<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сравнение с конкурентами | Robokassa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="v-rk-32.png">
  <style>
    :root {
      --blue:      #525FFB;
      --bg:        #F2F5FA;
      --white:     #FFFFFF;
      --ok:        #0D9F6E;
      --ok-bg:     #EAF8F2;
      --no:        #D93547;
      --no-bg:     #FFF1F3;
      --amber:     #A06A00;
      --amber-bg:  #FFF8E6;
      --border:    #E2E7F1;
      --border-s:  #EDF1F8;
      --text:      #182033;
      --muted:     #6B7394;
      --r:         20px;
      --r-sm:      14px;
      --shadow:    0 10px 30px rgba(29,37,74,0.08);
      --shadow-sm: 0 4px 14px rgba(29,37,74,0.06);
      --font:      'Geologica', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 28px 20px 64px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .page { max-width: 980px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
    .brand-row { display: flex; align-items: center; margin-bottom: 4px; }
    .brand-logo { width: 168px; height: auto; display: block; }
    .logo-fallback { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; display: none; }
    .hero { text-align: center; }
    .hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 5px; }
    .hero p  { font-size: 13px; color: var(--muted); font-weight: 500; }
    .alert { display: flex; align-items: center; gap: 8px; padding: 9px 16px; background: rgba(217,53,71,0.05); border: 1px solid rgba(217,53,71,0.17); border-radius: var(--r-sm); font-size: 12px; font-weight: 600; color: var(--no); }
    .brands { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .brand-card { border-radius: var(--r-sm); padding: 14px 18px; }
    .brand-card--rk { background: var(--blue); }
    .brand-card--rv { background: var(--white); border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
    .brand-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
    .brand-card--rk .brand-eyebrow { color: rgba(255,255,255,0.65); }
    .brand-card--rv .brand-eyebrow { color: var(--muted); }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .brand-card--rk .brand-name { color: #fff; }
    .brand-card--rv .brand-name { color: var(--text); }
    .brand-tag { display: inline-block; margin-top: 5px; padding: 2px 9px; border-radius: 999px; font-size: 10px; font-weight: 700; }
    .brand-card--rk .brand-tag { background: rgba(255,255,255,0.18); color: #fff; }
    .brand-card--rv .brand-tag { background: rgba(107,115,148,0.1); color: var(--muted); }
    .controls { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-sm); box-shadow: var(--shadow-sm); padding: 14px 18px; display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
    .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
    .sel-wrap { position: relative; display: inline-block; }
    .competitor-sel { height: 38px; min-width: 210px; border: 1px solid #CBD4E5; border-radius: 12px; padding: 0 36px 0 14px; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text); background: var(--white); cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; transition: border-color .15s, box-shadow .15s; }
    .competitor-sel:focus { border-color: rgba(82,95,251,0.4); box-shadow: 0 0 0 3px rgba(82,95,251,0.09); }
    .sel-wrap::after { content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--muted); }
    .switcher { display: inline-flex; background: rgba(82,95,251,0.07); border: 1px solid rgba(82,95,251,0.14); border-radius: 999px; padding: 3px; gap: 3px; }
    .sw-btn { border: 0; background: transparent; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--muted); padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: .15s; white-space: nowrap; }
    .sw-btn.on { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(82,95,251,0.28); }
    .diff-counter { display: none; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--muted); align-self: center; }
    .diff-counter.vis { display: flex; }
    .diff-n { min-width: 24px; height: 24px; padding: 0 7px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: rgba(82,95,251,0.1); color: var(--blue); font-size: 12px; font-weight: 700; }
    .col-header { position: sticky; top: 10px; z-index: 40; background: var(--white); border: 1px solid var(--border); border-radius: var(--r-sm); box-shadow: var(--shadow); display: grid; grid-template-columns: 2fr 1.4fr 1.4fr; }
    .ch-cell { padding: 11px 18px; display: flex; flex-direction: column; gap: 2px; }
    .ch-cell:not(:first-child) { border-left: 1px solid var(--border-s); }
    .ch-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); opacity: 0.75; }
    .ch-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .ch-tag { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; width: fit-content; margin-top: 2px; }
    .ch-tag--p { background: rgba(82,95,251,0.09); color: var(--blue); }
    .ch-tag--r { background: rgba(107,115,148,0.09); color: var(--muted); }
    .highlights { background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 0 var(--r-sm) var(--r-sm) 0; box-shadow: var(--shadow-sm); padding: 14px 18px; }
    .notes { background: var(--white); border: 1px solid rgba(160,106,0,0.25); border-left: 3px solid var(--amber); border-radius: 0 var(--r-sm) var(--r-sm) 0; box-shadow: var(--shadow-sm); padding: 14px 18px; }
    .notes-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--amber); margin-bottom: 8px; }
    .notes-text { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.6; }
    .notes-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 5px; }
    .notes-item:last-child { margin-bottom: 0; }
    .notes-dot { width: 5px; min-width: 5px; height: 5px; border-radius: 50%; background: var(--amber); margin-top: 6px; flex-shrink: 0; }
    .hl-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
    .hl-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 5px; }
    .hl-item:last-child { margin-bottom: 0; }
    .hl-dot { width: 5px; min-width: 5px; height: 5px; border-radius: 50%; background: var(--blue); margin-top: 6px; flex-shrink: 0; }
    .section { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow-sm); overflow: hidden; }
    .section-head { padding: 9px 20px; border-bottom: 1px solid var(--border-s); display: flex; align-items: center; gap: 8px; background: rgba(107,115,148,0.03); }
    .section-line { width: 3px; height: 13px; border-radius: 2px; background: var(--blue); opacity: 0.38; flex-shrink: 0; }
    .section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
    .param-row { display: grid; grid-template-columns: 2fr 1.4fr 1.4fr; border-top: 1px solid var(--border-s); transition: background .1s; }
    .param-row:hover { background: rgba(82,95,251,0.016); }
    .param-row.diff { background: rgba(82,95,251,0.012); }
    .param-row.diff:hover { background: rgba(82,95,251,0.028); }
    .param-row.hidden { display: none; }
    .p-label { padding: 10px 20px; font-size: 12px; font-weight: 500; color: var(--muted); line-height: 1.4; display: flex; align-items: center; }
    .param-row.diff .p-label { color: var(--text); font-weight: 600; }
    .p-cell { padding: 9px 14px 9px 16px; border-left: 1px solid var(--border-s); display: flex; flex-direction: column; gap: 3px; justify-content: center; }
    .p-cell--rk { background: rgba(82,95,251,0.028); border-left-color: rgba(82,95,251,0.12); }
    .p-note { font-size: 10px; color: var(--muted); line-height: 1.35; max-width: 180px; }
    .no-diff-notice { padding: 12px 20px; font-size: 11px; color: var(--muted); font-style: italic; text-align: center; border-top: 1px solid var(--border-s); }
    .chip { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .chip i { font-style: normal; font-size: 9px; }
    .chip-yes  { background: var(--ok-bg);    color: var(--ok); }
    .chip-no   { background: var(--no-bg);    color: var(--no); }
    .chip-par  { background: var(--amber-bg); color: var(--amber); }
    .chip-ptn  { background: rgba(82,95,251,0.08);   color: var(--blue); }
    .chip-req  { background: rgba(107,115,148,0.08); color: var(--muted); }
    .chip-soon { background: rgba(107,115,148,0.08); color: var(--muted); }
    .val-text  { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; }
    .val-unk   { font-size: 11px; color: var(--muted); opacity: 0.65; }
    .p-link { font-size: 11px; color: var(--blue); text-decoration: none; font-weight: 600; }
    .p-link:hover { text-decoration: underline; }
    .p-link-full { font-size: 11px; color: var(--blue); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 2px; }
    .p-link-full:hover { text-decoration: underline; }
    @media (max-width: 860px) { .col-header, .param-row { grid-template-columns: 1.6fr 1.2fr 1.2fr; } }
    @media (max-width: 768px) { body { padding: 20px 14px 52px; } .brand-logo { width: 32px; } .hero h1 { font-size: 22px; } .ch-tag { display: none; } }
    @media (max-width: 580px) { .col-header, .param-row { grid-template-columns: 1.1fr 1fr 1fr; } .col-header { position: static; } .ch-eyebrow { display: none; } .ch-name { font-size: 12px; } .p-label { font-size: 11px; padding: 9px 12px; } .p-cell { padding: 8px 10px; } .chip { font-size: 10px; padding: 2px 7px; } .val-text { font-size: 11px; } }
  </style>
</head>
<body>
<div class="page">

  <!-- ЛОГОТИП — заменить: положи новые файлы рядом и исправь src/srcset -->
  <div class="brand-row">
    <picture>
      <source media="(max-width: 768px)" srcset="icon_robokassa_black.png">
      <img class="brand-logo" src="logo_robokassa_black.png" alt="Robokassa"
           onerror="this.style.display='none';document.getElementById('logo-fb').style.display='block'">
    </picture>
    <span id="logo-fb" class="logo-fallback">Robokassa</span>
  </div>

  <div class="hero">
    <h1>Сравнение с конкурентами</h1>
    <p>Инструмент отдела продаж</p>
  </div>

  <div class="alert">
    <span>⚠</span>
    Внутренний инструмент для менеджеров. Не для клиентской отправки.
  </div>

  <div class="brands">
    <div class="brand-card brand-card--rk">
      <div class="brand-eyebrow">Ваш продукт</div>
      <div class="brand-name">Robokassa</div>
      <span class="brand-tag">Рекомендуем</span>
    </div>
    <div class="brand-card brand-card--rv">
      <div class="brand-eyebrow">Конкурент</div>
      <div class="brand-name" id="rival-name">—</div>
      <span class="brand-tag">Сравниваем</span>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label class="ctrl-label" for="rival-sel">Сравнить с</label>
      <div class="sel-wrap">
        <select id="rival-sel" class="competitor-sel"></select>
      </div>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Режим</label>
      <div class="switcher">
        <button class="sw-btn on" id="btn-all">Все параметры</button>
        <button class="sw-btn" id="btn-diff">Только отличия</button>
      </div>
    </div>
    <div class="diff-counter" id="diff-counter">
      Отличий: <span class="diff-n" id="diff-n">0</span>
    </div>
  </div>

  <div class="col-header">
    <div class="ch-cell"><span class="ch-eyebrow">Параметр</span></div>
    <div class="ch-cell">
      <span class="ch-eyebrow">Ваш продукт</span>
      <span class="ch-name">Robokassa</span>
      <span class="ch-tag ch-tag--p">Рекомендуем</span>
    </div>
    <div class="ch-cell">
      <span class="ch-eyebrow">Конкурент</span>
      <span class="ch-name" id="col-rival-name">—</span>
      <span class="ch-tag ch-tag--r">Сравниваем</span>
    </div>
  </div>

  <div id="hl-area"></div>
  <div id="notes-area"></div>
  <div id="cmp-area"></div>

</div>
<script>
// ╔══════════════════════════════════════════════════════════════════════╗
// ║  ДАННЫЕ — редактировать только здесь                                 ║
// ║                                                                       ║
// ║  Типы значений (поле v):                                              ║
// ║   "yes"  ✓ Есть   "no"  ✕ Нет   "partial" ≈ Частично               ║
// ║   "partner" ↗ Через партнёра   "request" По запросу                 ║
// ║   "soon" Скоро   "unknown" Нет данных   строка → текст               ║
// ║  Поле note — необязательный комментарий под значением.               ║
// ╚══════════════════════════════════════════════════════════════════════╝

const paramMeta = {
  // Базовые условия
  rf_cards:      "Карты РФ",
  foreign_cards: "Иностранные карты",
  sbp:           "СБП",
  pay_methods:   "Pay-методы (комиссия)",
  // Способы оплаты
  mirpay:        "MirPay",
  sberpay:       "SberPay",
  tpay:          "T-Pay",
  mtcpay:        "МТС Pay",
  alfapay:       "Альфа Pay",
  gazprompay:    "Газпром Pay",
  yandexpay:     "Yandex Pay",
  // Фискализация
  fiscal_54fz:   "Чеки по 54-ФЗ",
  fiscal_smz:    "Чеки для СМЗ",
  // BNPL
  yandex_split:  "Яндекс Сплит",
  bnpl:          "BNPL (Долями / Подели)",
  installment:   "Рассрочка",
  credit:        "Кредит",
  // Рекурренты
  hold:          "Холдирование",
  recurrents:    "Рекуррентные платежи",
  card_binding:  "Привязка карты",
  smz:           "Работа с СМЗ",
  // Кассы и интеграции
  own_kassa:     "Своя онлайн-касса",
  third_kassa:   "Интеграция сторонней кассы",
  payout:        "Вывод средств",
  crm_cms:       "Интеграция с CRM / CMS",
};

// ── Секции и порядок параметров ──────────────────────────────────────────
// Чтобы изменить порядок: переставь объекты или id внутри params[]
const sections = [
  { id:"tariffs",   title:"Базовые условия",           params:["rf_cards","foreign_cards","sbp","pay_methods"] },
  { id:"payments",  title:"Способы оплаты",             params:["mirpay","sberpay","tpay","mtcpay","alfapay","gazprompay","yandexpay"] },
  { id:"fiscal",    title:"Фискализация / 54-ФЗ",       params:["fiscal_54fz","fiscal_smz"] },
  { id:"bnpl",      title:"BNPL / Рассрочка / Кредиты", params:["yandex_split","bnpl","installment","credit"] },
  { id:"recur",     title:"Рекурренты / Холдирование",  params:["hold","recurrents","card_binding","smz"] },
  { id:"kassa",     title:"Кассы / Интеграции / Вывод", params:["own_kassa","third_kassa","payout","crm_cms"] },
];

// ── Провайдеры ───────────────────────────────────────────────────────────
// isPrimary: true → Robokassa, всегда слева. Не трогать.
//
// КАК ДОБАВИТЬ НОВОГО КОНКУРЕНТА:
//  1. Скопируй один объект ниже (от { до конечной },)
//  2. Заполни id, name, highlights[] и params{}
//  3. Сохрани — конкурент появится в dropdown сам
// @@PROVIDERS_START@@
const providers = [
  {
    id:"robokassa", name:"Робокасса", isPrimary:true,
    highlights:[],
    params:{
      osobennosti: {v:"unknown"},
      rf_cards: {v:"3,9%\nмин 2,9%"},
      foreign_cards: {v:"9,9%"},
      sbp: {v:"от 2,7%\nmin 1,8%\nлимит 1 млн₽"},
      pay_methods: {v:"как карты\nAlfapay+0,3%\nYandex pay+1,9%"},
      mirpay: {v:"yes"},
      sberpay: {v:"yes"},
      tpay: {v:"yes"},
      mtcpay: {v:"yes"},
      alfapay: {v:"yes"},
      gazprompay: {v:"partner", note:"Cкоро"},
      yandexpay: {v:"yes"},
      yandex_split: {v:"yes"},
      bnpl: {v:"partner", note:"Подели Mokka"},
      installment: {v:"partner", note:"ОТП"},
      credit: {v:"partner", note:"ОТП"},
      hold: {v:"yes"},
      recurrents: {v:"yes"},
      card_binding: {v:"yes"},
      smz: {v:"yes"},
      fiscal_smz: {v:"yes"},
      fiscal_54fz: {v:"Робочеки"},
      own_kassa: {v:"Robokassa Online"},
      third_kassa: {v:"yes"},
      payout: {v:"Настраиваемый ввод"},
      crm_cms: {v:"link", note:"https://docs.robokassa.ru"},
    },
  },
  {
    id:"yukassasber", name:"Ю.касса / СБЕР", isPrimary:false,
    highlights:["МТС Pay, Альфа Pay, Газпром Pay, Yandex Pay, Яндекс Сплит — только у Robokassa", "Работа с СМЗ и чеки для СМЗ — только у Robokassa", "Фискализация у Ю.кассы платная (доп. комиссия сверх тарифа); у Robokassa включена", "Привязка карты — только у Robokassa; у Ю.кассы отсутствует", "СБП у Ю.кассы дешевле: 0,4–0,7% против от 1,8% у Robokassa"],
    params:{
      osobennosti: {v:"Спецтариф для клиентов с р/с в Сбере при подключении к Юкасса впервые"},
      rf_cards: {v:"3,5%\nмин. 2,8%"},
      foreign_cards: {v:"4,0%"},
      sbp: {v:"0,4-0,7%\nлимит 700К"},
      pay_methods: {v:"как карты"},
      mirpay: {v:"yes"},
      sberpay: {v:"yes"},
      tpay: {v:"yes"},
      mtcpay: {v:"no"},
      alfapay: {v:"no"},
      gazprompay: {v:"no"},
      yandexpay: {v:"no"},
      yandex_split: {v:"no"},
      bnpl: {v:"partner", note:"«Плати частями» от Сбер (до 50 000 ₽)"},
      installment: {v:"partner", note:"«‎Покупки в кредит»‎ от Сбер"},
      credit: {v:"partner", note:"«‎Покупки в кредит»‎ от Сбер"},
      hold: {v:"yes"},
      recurrents: {v:"yes"},
      card_binding: {v:"no"},
      smz: {v:"yes"},
      fiscal_smz: {v:"no"},
      fiscal_54fz: {v:"Чеки от ЮKassa\nидет как доп. комиссия поверх тарифа (зависит от оборота)"},
      own_kassa: {v:"link", note:"https://yookassa.ru"},
      third_kassa: {v:"partner", note:"Эватор Первый ОФД АТОЛ Онлайн Kit Online Комтет МодульКасса ОК РЕСТАРТ"},
      payout: {v:"Автоматический ежедневный вывод"},
      crm_cms: {v:"link", note:"https://yookassa.ru"},
    },
  },
  {
    id:"prodamus", name:"Prodamus", isPrimary:false,

const VL={yes:"Есть",no:"Нет",partial:"Частично",partner:"Через партнёра",request:"По запросу",soon:"Скоро"};
const VI={yes:"✓",no:"✕",partial:"≈",partner:"↗",soon:"◷",request:"~"};
const VC={yes:"chip chip-yes",no:"chip chip-no",partial:"chip chip-par",partner:"chip chip-ptn",request:"chip chip-req",soon:"chip chip-soon"};
const primary=providers.find(p=>p.isPrimary), rivals=providers.filter(p=>!p.isPrimary);
let curRival=rivals[0], mode='all';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isUrl(s){return s&&(s.startsWith('http://')||s.startsWith('https://'));}
function urlDomain(u){return u.replace(/https?:\/\/www\.?/,'').split('/')[0];}
function renderVal(p){
  if(!p||p.v===undefined||String(p.v).trim()==='') return '<span class="val-unk">—</span>';
  const v=String(p.v).trim(), note=p.note||'';
  const noteIsUrl=isUrl(note);

  // Unknown
  if(v==='unknown') return '<span class="val-unk">Нет данных</span>';

  // Pure link (v='link') → just the hyperlink, no chip
  if(v==='link'&&noteIsUrl)
    return `<a href="${note}" target="_blank" class="p-link-full">🔗 ${esc(urlDomain(note))}</a>`;

  // Value itself is a URL
  if(isUrl(v))
    return `<a href="${v}" target="_blank" class="p-link-full">🔗 ${esc(urlDomain(v))}</a>`;

  // Standard chips (yes/no/partial/request/soon) — keep chip, add link if note is URL
  if(v!=='partner'&&VL[v]){
    const noteHtml=note
      ? (noteIsUrl
          ? `<div class="p-note"><a href="${note}" target="_blank" class="p-link">🔗 ${esc(urlDomain(note))}</a></div>`
          : `<div class="p-note">${esc(note)}</div>`)
      : '';
    return `<span class="${VC[v]}"><i>${VI[v]}</i> ${VL[v]}</span>${noteHtml}`;
  }

  // Partner with URL note → drop chip, show link only
  if(v==='partner'&&noteIsUrl)
    return `<a href="${note}" target="_blank" class="p-link-full">🔗 ${esc(urlDomain(note))}</a>`;

  // Partner with text note → keep chip + note
  if(v==='partner'){
    const noteHtml=note?`<div class="p-note">${esc(note)}</div>`:'';
    return `<span class="${VC['partner']}"><i>${VI['partner']}</i> ${VL['partner']}</span>${noteHtml}`;
  }

  // Plain text value + URL note → text as clickable link
  if(noteIsUrl)
    return `<a href="${note}" target="_blank" class="p-link-full">${esc(v)}</a>`;

  // Plain text + text note
  const noteHtml=note?`<div class="p-note">${esc(note)}</div>`:'';
  return `<span class="val-text">${esc(v)}</span>${noteHtml}`;
}
function areSame(a,b){
  const e=x=>!x||x.v===undefined||String(x.v).trim()==='';
  if(e(a)&&e(b)) return true; if(e(a)||e(b)) return false;
  const na=String(a.v).toLowerCase().trim(), nb=String(b.v).toLowerCase().trim();
  if(na==='unknown'||nb==='unknown'||na==='soon'||nb==='soon') return false;
  return na===nb;
}
function render(){
  document.getElementById('rival-name').textContent=curRival.name;
  document.getElementById('col-rival-name').textContent=curRival.name;
  const hlArea=document.getElementById('hl-area'), hl=curRival.highlights||[];
  if(hl.length){
    hlArea.style.display='block';
    hlArea.innerHTML=`<div class="highlights"><div class="hl-title">Ключевые отличия: Robokassa vs ${esc(curRival.name)}</div>${hl.map(h=>`<div class="hl-item"><span class="hl-dot"></span>${esc(h)}</div>`).join('')}</div>`;
  } else { hlArea.innerHTML=''; hlArea.style.display='none'; }
  // Особенности подключения
  const notesArea=document.getElementById('notes-area');
  const notesVal=curRival.params&&curRival.params.osobennosti?curRival.params.osobennosti.v:'';
  const notesNote=curRival.params&&curRival.params.osobennosti?curRival.params.osobennosti.note||'':'';
  const notesText=notesVal&&notesVal!=='unknown'&&notesVal!=='yes'&&notesVal!=='no'?notesVal:notesNote;
  if(notesText&&notesText.trim()){
    notesArea.style.display='block';
    const notesLines=notesText.trim().split(/\n+/).map(l=>l.trim()).filter(Boolean);
    const notesBody=notesLines.length>1
      ? notesLines.map(l=>`<div class="notes-item"><span class="notes-dot"></span>${esc(l)}</div>`).join('')
      : `<div class="notes-text">${esc(notesText.trim())}</div>`;
    notesArea.innerHTML=`<div class="notes"><div class="notes-title">⚠ Особенности подключения: ${esc(curRival.name)}</div>${notesBody}</div>`;
  } else { notesArea.innerHTML=''; notesArea.style.display='none'; }
  const area=document.getElementById('cmp-area'); area.innerHTML='';
  sections.forEach(sec=>{
    const block=document.createElement('div'); block.className='section';
    block.innerHTML=`<div class="section-head"><span class="section-line"></span><span class="section-title">${esc(sec.title)}</span></div>`;
    sec.params.forEach(pid=>{
      const pv=primary.params[pid]||null, cv=curRival.params[pid]||null, diff=!areSame(pv,cv);
      const row=document.createElement('div');
      row.className='param-row'+(diff?' diff':''); row.dataset.same=diff?'0':'1';
      row.innerHTML=`<div class="p-label">${esc(paramMeta[pid]||pid)}</div><div class="p-cell p-cell--rk">${renderVal(pv)}</div><div class="p-cell">${renderVal(cv)}</div>`;
      block.appendChild(row);
    });
    area.appendChild(block);
  });
  applyMode();
}
function applyMode(){
  let cnt=0;
  document.querySelectorAll('.param-row').forEach(r=>{const s=r.dataset.same==='1';r.classList.toggle('hidden',mode==='diff'&&s);if(!s)cnt++;});
  document.querySelectorAll('.no-diff-notice').forEach(el=>el.remove());
  if(mode==='diff'){
    document.querySelectorAll('.section').forEach(sec=>{
      if(!sec.querySelectorAll('.param-row:not(.hidden)').length){
        const m=document.createElement('div'); m.className='no-diff-notice'; m.textContent='В этой секции условия совпадают'; sec.appendChild(m);
      }
    });
  }
  document.getElementById('diff-n').textContent=cnt;
  document.getElementById('diff-counter').classList.toggle('vis',mode==='diff');
}
const sel=document.getElementById('rival-sel');
rivals.forEach(r=>{const o=document.createElement('option');o.value=r.id;o.textContent=r.name;sel.appendChild(o);});
sel.addEventListener('change',e=>{curRival=rivals.find(r=>r.id===e.target.value)||rivals[0];render();});
document.getElementById('btn-all').addEventListener('click',()=>{if(mode==='all')return;mode='all';document.getElementById('btn-all').classList.add('on');document.getElementById('btn-diff').classList.remove('on');applyMode();});

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сравнение с конкурентами | Robokassa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="v-rk-32.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">

  <!-- ─── ЛОГОТИП ───────────────────────────────────────────────────
    Чтобы заменить: положи новые файлы рядом и исправь src/srcset.
    Если файла нет — автоматически появится текст «Robokassa».
  ──────────────────────────────────────────────────────────────── -->
  <div class="brand-row">
    <picture class="brand-picture">
      <source media="(max-width: 768px)" srcset="icon_robokassa_black.png">
      <img class="brand-logo" src="logo_robokassa_black.png" alt="Robokassa"
           onerror="this.style.display='none';document.getElementById('logo-fb').style.display='block'">
    </picture>
    <span id="logo-fb" class="logo-fallback" style="display:none">Robokassa</span>
  </div>

  <!-- ─── ЗАГОЛОВОК ─────────────────────────────────────────────────
    Текст меняй прямо здесь.
  ──────────────────────────────────────────────────────────────── -->
  <section class="hero">
    <h1>Сравнение с конкурентами</h1>
    <p>Инструмент отдела продаж</p>
  </section>

  <!-- ─── СЛУЖЕБНАЯ ПЛАШКА ──────────────────────────────────────────
    Текст меняй прямо здесь.
  ──────────────────────────────────────────────────────────────── -->
  <div class="internal-badge">
    <span class="internal-badge__icon">⚠</span>
    Внутренний инструмент для менеджеров. Не для клиентской отправки.
  </div>

  <!-- ─── ПАНЕЛЬ УПРАВЛЕНИЯ ──────────────────────────────────────────
    Dropdown заполняется из data.js (providers[]) автоматически.
  ──────────────────────────────────────────────────────────────── -->
  <div class="card controls-card">
    <div class="controls-row">

      <div class="control-group">
        <label class="control-label" for="competitor-select">Сравнить с</label>
        <div class="select-wrap">
          <select id="competitor-select" class="competitor-select">
            <!-- заполняется script.js -->
          </select>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">Режим отображения</label>
        <div class="switcher">
          <button type="button" id="btn-all" class="active">Все параметры</button>
          <button type="button" id="btn-diff">Только отличия</button>
        </div>
      </div>

      <div class="diff-counter" id="diff-counter">
        Отличий: <span class="diff-counter__num" id="diff-counter-num">0</span>
      </div>

    </div>
  </div>

  <!-- ─── STICKY-ШАПКА КОЛОНОК ───────────────────────────────────── -->
  <div class="compare-header">
    <div class="ch-cell">
      <span class="ch-eyebrow">Параметр</span>
    </div>
    <div class="ch-cell">
      <span class="ch-eyebrow">Ваш продукт</span>
      <span class="ch-name">Robokassa</span>
      <span class="ch-tag ch-tag--primary">Рекомендуем</span>
    </div>
    <div class="ch-cell">
      <span class="ch-eyebrow">Конкурент</span>
      <span class="ch-name" id="ch-competitor-name">—</span>
      <span class="ch-tag ch-tag--rival">Сравниваем</span>
    </div>
  </div>

  <!-- ─── КЛЮЧЕВЫЕ ОТЛИЧИЯ ───────────────────────────────────────────
    Рендерится из script.js. Данные — highlights[] в data.js.
  ──────────────────────────────────────────────────────────────── -->
  <div id="highlights-area"></div>

  <!-- ─── БЛОКИ СРАВНЕНИЯ ────────────────────────────────────────────
    Рендерится из script.js. Данные — sections[] + providers[] в data.js.
  ──────────────────────────────────────────────────────────────── -->
  <div id="comparison-area"></div>

</div><!-- /.page -->

<!-- Порядок важен: data.js раньше script.js -->
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
